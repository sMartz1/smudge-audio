<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'" />
  <title>Smudge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="titlebar">
    <div class="titlebar-brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <span class="brand-word">SMUDGE</span>
    </div>
    <div class="titlebar-controls">
      <button id="win-min" class="winctl" type="button" aria-label="Minimizar">
        <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><line x1="1" y1="5" x2="9" y2="5" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button id="win-max" class="winctl" type="button" aria-label="Maximizar">
        <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button id="win-close" class="winctl winctl-close" type="button" aria-label="Cerrar">
        <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1"/></svg>
      </button>
    </div>
  </header>

  <main>
    <section class="zone" data-zone="source">
      <h2 class="zone-label">SOURCE</h2>

      <div id="drop-zone" class="drop-zone idle">
        <div class="drop-idle">
          <svg class="drop-icon" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
            <path d="M2 11 Q4 7 6 11 T10 11 T14 11 T18 11 T22 11" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <p class="drop-text">Arrastra un audio o <button id="browse-btn" type="button" class="link-btn">selecciona archivo</button></p>
          <p class="drop-hint">mp3 · wav · flac · m4a · ogg · aac</p>
        </div>
        <div class="drop-chip">
          <span class="chip-dot" aria-hidden="true"></span>
          <span class="chip-name" id="chip-name"></span>
          <button id="chip-remove" type="button" class="chip-remove" aria-label="Quitar archivo">
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1"/></svg>
          </button>
        </div>
      </div>

      <div class="url-row">
        <div class="url-input-wrap">
          <input id="url-input" type="text" placeholder="URL de YouTube" autocomplete="off" />
          <div id="url-progress" class="url-progress" aria-hidden="true"></div>
        </div>
        <button id="url-btn" type="button" class="btn-secondary">CARGAR</button>
      </div>
    </section>

    <section class="zone" data-zone="camouflage">
      <h2 class="zone-label">
        CAMOUFLAGE
        <span id="custom-badge" class="custom-badge hidden">CUSTOM</span>
      </h2>

      <div id="preset-row" class="segmented">
        <button type="button" class="seg" data-preset="off">OFF</button>
        <button type="button" class="seg active" data-preset="suave">SUAVE</button>
        <button type="button" class="seg" data-preset="medio">MEDIO</button>
        <button type="button" class="seg" data-preset="agresivo">AGRESIVO</button>
      </div>

      <details class="advanced">
        <summary>AVANZADO</summary>
        <div class="advanced-grid">
          <label class="slider-row" data-bipolar="true">
            <span class="slider-label">PITCH</span>
            <span class="slider-value" id="pitch-value">+30 cents</span>
            <input id="pitch" type="range" min="-300" max="300" step="10" value="30" />
          </label>
          <label class="slider-row" data-bipolar="true">
            <span class="slider-label">TEMPO</span>
            <span class="slider-value" id="tempo-value">+2 %</span>
            <input id="tempo" type="range" min="-10" max="10" step="1" value="2" />
          </label>
          <label class="slider-row" data-bipolar="true">
            <span class="slider-label">BASS</span>
            <span class="slider-value" id="bass-value">-1 dB</span>
            <input id="bass" type="range" min="-6" max="6" step="1" value="-1" />
          </label>
          <label class="slider-row" data-bipolar="true">
            <span class="slider-label">TREBLE</span>
            <span class="slider-value" id="treble-value">+1 dB</span>
            <input id="treble" type="range" min="-6" max="6" step="1" value="1" />
          </label>
          <label class="slider-row">
            <span class="slider-label">REVERB</span>
            <span class="slider-value" id="reverb-value">5 %</span>
            <input id="reverb" type="range" min="0" max="30" step="1" value="5" />
          </label>
          <label class="slider-row">
            <span class="slider-label">PINK NOISE</span>
            <span class="slider-value" id="noise-value">-30 dB</span>
            <input id="noise" type="range" min="-50" max="-5" step="1" value="-30" />
          </label>

          <label class="toggle-row" for="suno-scrub">
            <input id="suno-scrub" type="checkbox" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-text">
              <span class="toggle-title">SUNO SCRUB</span>
              <span class="toggle-hint">Notches en 7 bandas de watermark + adeclick</span>
            </span>
          </label>

          <label class="toggle-row" for="vocal-scrub">
            <input id="vocal-scrub" type="checkbox" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-text">
              <span class="toggle-title">VOCAL SCRUB</span>
              <span class="toggle-hint">Duck del canal central + pitch sin chipmunk (canciones con voz)</span>
            </span>
          </label>
        </div>
      </details>
    </section>

    <section class="zone" data-zone="output">
      <button id="process-btn" class="cta" type="button" disabled>
        <span class="cta-label">PROCESAR Y EXPORTAR</span>
        <span class="cta-progress" aria-hidden="true"></span>
      </button>

      <button id="batch-btn" class="cta-secondary" type="button" disabled>
        <span class="batch-icon" aria-hidden="true"></span>
        <span>GENERAR 10 VARIACIONES</span>
        <span class="batch-hint">Off → Agresivo</span>
      </button>

      <div id="variation-row" class="variation-row hidden" aria-hidden="true">
        <div class="variation-dots">
          <span class="vd" data-v="0"></span>
          <span class="vd" data-v="1"></span>
          <span class="vd" data-v="2"></span>
          <span class="vd" data-v="3"></span>
          <span class="vd" data-v="4"></span>
          <span class="vd" data-v="5"></span>
          <span class="vd" data-v="6"></span>
          <span class="vd" data-v="7"></span>
          <span class="vd" data-v="8"></span>
          <span class="vd" data-v="9"></span>
        </div>
        <span class="variation-counter" id="variation-counter">VAR 1 / 10</span>
      </div>

      <div id="status-panel" class="status-panel hidden" role="status" aria-live="polite"></div>
      <div id="error-panel" class="error-panel hidden" role="alert">
        <span class="error-icon" aria-hidden="true">!</span>
        <span class="error-text" id="error-text"></span>
        <button id="error-dismiss" type="button" class="error-dismiss" aria-label="Descartar">
          <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1"/></svg>
        </button>
      </div>
    </section>

    <section class="audio-stage hidden" id="audio-stage" aria-hidden="true">
      <div class="stage-header">
        <span class="stage-label">SIGNAL</span>
        <span class="stage-name" id="stage-name"></span>
        <span class="stage-state" id="stage-state">READY</span>
      </div>
      <div class="stage-viz">
        <div class="stage-bars" id="stage-bars"></div>
        <div class="stage-bars stage-bars-reflect" id="stage-bars-reflect" aria-hidden="true"></div>
        <div class="stage-scan" aria-hidden="true"></div>
        <div class="stage-glow" aria-hidden="true"></div>
        <div class="stage-progress" id="stage-progress" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
